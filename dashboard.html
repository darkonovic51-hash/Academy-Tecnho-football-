<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | أكاديمية تيكنو</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    :root {
        --primary-blue:#0B2A6F; --primary-blue-dark:#081F4D; --primary-blue-light:#1E3F8F;
        --accent-red:#D91E2E; --accent-red-hover:#B51725;
        --color-success:#22C55E; --color-warning:#F59E0B; --color-danger:#DC2626;
        --text-dark:#1E293B; --text-muted:#64748B; --border-card:rgba(11,42,111,0.10);
        --transition:0.25s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'IBM Plex Sans Arabic','Cairo',sans-serif; background:#F5F7FA; color:var(--text-dark); }
    .shell { display:flex; height:100vh; overflow:hidden; }
    .sidebar { width:260px; flex-shrink:0; background:var(--primary-blue-dark); display:flex; flex-direction:column; padding:20px 0; overflow-y:auto; }
    .sidebar .brand { color:#fff; font-weight:800; font-size:1.05rem; padding:8px 22px 18px; display:flex; align-items:center; gap:10px; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:10px; }
    .sidebar .brand i { color:var(--accent-red); }
    .nav-items { display:flex; flex-direction:column; gap:4px; padding:0 12px; flex:1; }
    .nav-item { display:flex; align-items:center; gap:12px; color:rgba(255,255,255,0.75); padding:11px 16px; border-radius:12px; font-size:0.9rem; font-weight:500; cursor:pointer; transition:var(--transition); }
    .nav-item i { width:18px; text-align:center; color:rgba(255,255,255,0.5); }
    .nav-item:hover { background:var(--primary-blue-light); color:#fff; }
    .nav-item:hover i { color:#fff; }
    .nav-item.active { background:var(--accent-red); color:#fff; }
    .nav-item.active i { color:#fff; }
    .nav-back { color:rgba(255,255,255,0.55); font-size:0.8rem; padding:10px 22px; display:block; text-decoration:none; border-top:1px solid rgba(255,255,255,0.08); margin-top:6px; }
    .nav-back:hover { color:#fff; }
    .logout-btn { color:rgba(255,255,255,0.55); font-size:0.8rem; padding:10px 22px; background:none; border:none; text-align:right; cursor:pointer; width:100%; }
    .logout-btn:hover { color:var(--accent-red); }
    .main { flex:1; overflow-y:auto; padding:28px 30px 60px; }

    .page-title { font-size:1.7rem; font-weight:800; margin-bottom:4px; }
    .page-sub { color:var(--text-muted); margin-bottom:22px; font-size:0.95rem; }
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:16px; margin-bottom:26px; }
    .stat-box { background:#fff; border-radius:14px; padding:16px; text-align:center; border:1px solid var(--border-card); box-shadow:0 4px 16px rgba(11,42,111,0.06); }
    .stat-box .num { font-size:1.7rem; font-weight:800; color:var(--primary-blue); }
    .stat-box .label { color:var(--text-muted); font-size:0.78rem; margin-top:4px; }

    .form-card { background:#fff; border-radius:14px; border:1px solid var(--border-card); padding:20px; margin-bottom:20px; }
    .form-card h3 { font-size:1.05rem; margin-bottom:14px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-grid .full { grid-column:1/-1; }
    .form-group label { font-weight:600; font-size:0.83rem; display:block; margin-bottom:5px; }
    .form-group input, .form-group select, .form-group textarea {
        width:100%; padding:9px 13px; border-radius:10px; border:1.5px solid var(--border-card);
        font-family:inherit; font-size:0.92rem; background:#fff; color:var(--text-dark);
    }
    .form-group textarea { min-height:70px; resize:vertical; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--accent-red); }

    .table-wrap { overflow-x:auto; background:#fff; border-radius:14px; border:1px solid var(--border-card); padding:4px 0; margin-bottom:20px; }
    .table-wrap table { width:100%; border-collapse:collapse; font-size:0.88rem; }
    .table-wrap th { background:var(--primary-blue-dark); color:#fff; padding:11px 9px; text-align:center; }
    .table-wrap td { padding:10px 9px; text-align:center; border-bottom:1px solid rgba(11,42,111,0.08); }
    .table-wrap tbody tr:hover { background:rgba(11,42,111,0.04); }

    .btn-sm { border:none; padding:6px 14px; border-radius:20px; font-weight:600; font-size:0.78rem; cursor:pointer; display:inline-flex; align-items:center; gap:4px; transition:0.2s; }
    .btn-sm:hover { transform:scale(1.05); }
    .btn-sm-primary { background:var(--primary-blue); color:#fff; }
    .btn-sm-success { background:var(--color-success); color:#fff; }
    .btn-sm-danger { background:var(--color-danger); color:#fff; }
    .btn-sm-warning { background:var(--color-warning); color:#212529; }
    .btn-sm-info { background:var(--primary-blue-light); color:#fff; }

    .image-field-preview { display:flex; align-items:center; gap:10px; margin-top:6px; flex-wrap:wrap; }
    .image-field-preview img { width:56px; height:56px; object-fit:cover; border-radius:10px; border:1px solid var(--border-card); }
    .upload-badge { color:var(--color-success); font-weight:700; font-size:0.82rem; }

    .placeholder-box { text-align:center; padding:60px 20px; background:#fff; border-radius:14px; border:1px dashed var(--border-card); color:var(--text-muted); }
    .placeholder-box i { font-size:2.5rem; color:var(--accent-red); opacity:0.4; margin-bottom:12px; display:block; }

    .folder-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:10px; }
    .folder-card { background:#fff; border:1px solid var(--border-card); border-radius:16px; padding:22px 16px; text-align:center; cursor:pointer; transition:0.25s; }
    .folder-card:hover { transform:translateY(-4px); border-color:var(--accent-red); box-shadow:0 10px 24px rgba(217,30,46,0.15); }
    .folder-card i { font-size:2rem; color:var(--accent-red); margin-bottom:8px; display:block; }
    .folder-card .cat-name { font-weight:700; font-size:1rem; margin-bottom:4px; }
    .folder-card .cat-count { color:var(--text-muted); font-size:0.8rem; }
    .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--primary-blue); font-weight:600; font-size:0.88rem; cursor:pointer; margin-bottom:14px; }
    .back-link:hover { color:var(--accent-red); }
    .att-toggle { display:flex; gap:6px; justify-content:center; }
    .att-toggle button { border:none; padding:5px 14px; border-radius:20px; font-weight:700; font-size:0.75rem; cursor:pointer; opacity:0.35; transition:0.2s; }
    .att-toggle button.present-btn { background:var(--color-success); color:#fff; }
    .att-toggle button.absent-btn { background:var(--color-danger); color:#fff; }
    .att-toggle button.selected { opacity:1; transform:scale(1.05); }
    .profile-tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .profile-tab-btn { background:#F1F5F9; border:none; padding:7px 16px; border-radius:20px; cursor:pointer; font-weight:600; color:var(--text-muted); font-size:0.82rem; }
    .profile-tab-btn.active { background:var(--accent-red); color:#fff; }
    .profile-tab-content { display:none; }
    .profile-tab-content.active { display:block; }
    .pay-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; }
    .pay-month-box { border:1px solid var(--border-card); border-radius:12px; padding:10px; text-align:center; }
    .pay-month-box .m-label { font-weight:700; font-size:0.85rem; margin-bottom:6px; }
    .pay-month-box button { border:none; padding:5px 12px; border-radius:20px; font-weight:700; font-size:0.75rem; cursor:pointer; width:100%; }
    .pay-month-box.paid button { background:var(--color-success); color:#fff; }
    .pay-month-box.unpaid button { background:#e2e8f0; color:var(--text-muted); }

    .dyn-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
    .dyn-row input { flex:1; min-width:120px; padding:9px 13px; border-radius:10px; border:1.5px solid var(--border-card); font-family:inherit; }
    .dyn-row .btn-sm { flex-shrink:0; }
    .settings-section { margin-bottom:26px; }
    .settings-section h4 { font-size:0.95rem; margin-bottom:12px; color:var(--primary-blue); }
    .badge-status { display:inline-block; padding:4px 12px; border-radius:20px; font-size:0.72rem; font-weight:700; }
    .badge-status.pending { background:rgba(245,158,11,0.15); color:#B45309; }
    .badge-status.approved { background:rgba(34,197,94,0.15); color:#15803D; }
    .badge-status.rejected { background:rgba(220,38,38,0.15); color:#B91C1C; }
    .badge-status.edit_requested { background:rgba(11,42,111,0.12); color:var(--primary-blue); }
    .callup-row { display:flex; align-items:center; justify-content:space-between; background:#F1F5F9; border-radius:10px; padding:8px 14px; margin-bottom:6px; flex-wrap:wrap; gap:8px; }
    .callup-row .cp-name { font-weight:600; }
    .callup-row .cp-cat { color:var(--text-muted); font-size:0.78rem; margin-right:6px; }

    .player-avatar-mini { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg, var(--primary-blue), var(--accent-red)); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-weight:800; font-size:0.85rem; flex-shrink:0; }
    .btn-file-record { border:none; background:linear-gradient(135deg, var(--primary-blue-dark), var(--primary-blue)); color:#fff; padding:7px 16px; border-radius:20px; font-weight:700; font-size:0.8rem; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:0.25s; box-shadow:0 3px 10px rgba(11,42,111,0.2); }
    .btn-file-record:hover { transform:translateY(-2px); background:linear-gradient(135deg, var(--accent-red), var(--accent-red-hover)); box-shadow:0 6px 16px rgba(217,30,46,0.3); }

    .info-card-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .info-card-item { background:linear-gradient(135deg, #F1F5F9, #E8EDF5); border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:12px; border-right:3px solid var(--accent-red); }
    .info-card-item.full { grid-column:1/-1; }
    .info-card-item i { font-size:1.3rem; color:var(--primary-blue); width:32px; text-align:center; flex-shrink:0; }
    .info-card-item .ic-label { font-size:0.72rem; color:var(--text-muted); margin-bottom:2px; }
    .info-card-item .ic-value { font-weight:700; color:var(--text-dark); }
    @media (max-width:600px) { .info-card-grid { grid-template-columns:1fr; } }

    /* ===== ملف اللاعب الاحترافي ===== */
    .record-header { display:flex; align-items:center; gap:16px; background:linear-gradient(135deg, var(--primary-blue-dark), var(--primary-blue)); color:#fff; padding:22px 26px; border-radius:16px 16px 0 0; margin:-24px -24px 20px; position:relative; overflow:hidden; }
    .record-header::after { content:''; position:absolute; bottom:0; left:0; width:100%; height:4px; background:linear-gradient(90deg, var(--accent-red), var(--accent-red-hover), var(--accent-red)); }
    .record-avatar { width:60px; height:60px; border-radius:50%; background:var(--accent-red); display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-weight:900; flex-shrink:0; box-shadow:0 4px 14px rgba(217,30,46,0.4); }
    .record-header h3 { color:#fff; margin:0; font-size:1.3rem; }
    .record-sub { color:rgba(255,255,255,0.75); font-size:0.85rem; margin-top:3px; }

    /* ===== نافذة تسجيل الحضور المخصصة ===== */
    .att-modal-header { display:flex; align-items:center; gap:12px; background:linear-gradient(135deg, var(--primary-blue-dark), var(--primary-blue)); color:#fff; padding:18px 24px; border-radius:16px 16px 0 0; margin:-24px -24px 18px; font-weight:800; font-size:1.05rem; }
    .att-modal-header i { font-size:1.5rem; color:#FF6B6B; }

    /* ===== تاريخ الدفع ===== */
    .pay-date { font-size:0.68rem; color:var(--text-muted); margin-top:6px; }
    .pay-date i { color:var(--color-success); margin-left:3px; }

    /* ===== وضوح الكتابة (نمط القنوات الرياضية الكبرى) ===== */
    .form-group label { font-weight:800; letter-spacing:0.2px; border-right:3px solid var(--accent-red); padding-right:8px; font-size:0.86rem; }
    .table-wrap th { letter-spacing:0.5px; font-size:0.82rem; font-weight:800; }
    .table-wrap td { font-size:0.9rem; }
    .page-title { letter-spacing:0.3px; }
    .page-sub { font-weight:500; }
    .form-card h3 { letter-spacing:0.2px; border-right:4px solid var(--accent-red); padding-right:10px; }

    /* ===== المرحلة 6: تصميم رياضي احترافي ===== */
    @keyframes fadeInUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes glowPulse { 0%,100% { box-shadow:0 0 0 0 rgba(217,30,46,0.35); } 50% { box-shadow:0 0 0 8px rgba(217,30,46,0); } }

    body { background:linear-gradient(160deg, #F5F7FA 0%, #EEF1F6 100%); }

    .sidebar { background:linear-gradient(180deg, var(--primary-blue-dark) 0%, #061630 100%); box-shadow:4px 0 20px rgba(0,0,0,0.15); position:relative; }
    .sidebar::after { content:''; position:absolute; top:0; right:0; width:3px; height:100%; background:linear-gradient(180deg, var(--accent-red), transparent 60%, var(--accent-red)); }
    .sidebar .brand i { animation:glowPulse 2.5s infinite; border-radius:50%; padding:6px; }
    .nav-item { position:relative; overflow:hidden; }
    .nav-item::before { content:''; position:absolute; right:0; top:0; height:100%; width:4px; background:var(--accent-red); transform:scaleY(0); transition:transform 0.25s ease; }
    .nav-item:hover::before, .nav-item.active::before { transform:scaleY(1); }
    .nav-item.active { background:linear-gradient(90deg, var(--accent-red), var(--accent-red-hover)); box-shadow:0 4px 14px rgba(217,30,46,0.35); }
    .nav-item i { transition:transform 0.25s ease; }
    .nav-item:hover i { transform:scale(1.15) rotate(-6deg); }

    .page-title { animation:fadeInUp 0.45s ease; background:linear-gradient(90deg, var(--primary-blue), var(--accent-red)); -webkit-background-clip:text; background-clip:text; color:transparent; display:inline-block; }
    .page-sub { animation:fadeInUp 0.5s ease; }
    .form-card, .table-wrap, .stats-row, .folder-grid { animation:fadeInUp 0.55s ease; }

    .stat-box { position:relative; overflow:hidden; border-top:3px solid var(--accent-red); }
    .stat-box::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at top left, rgba(217,30,46,0.06), transparent 60%); }
    .stat-box:hover { box-shadow:0 14px 30px rgba(217,30,46,0.18); border-top-color:var(--primary-blue); }
    .stat-box .num { background:linear-gradient(90deg, var(--primary-blue), var(--accent-red)); -webkit-background-clip:text; background-clip:text; color:transparent; }

    .btn-sm { position:relative; overflow:hidden; box-shadow:0 3px 10px rgba(0,0,0,0.08); }
    .btn-sm::after { content:''; position:absolute; top:0; left:-120%; width:60%; height:100%; background:linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent); transform:skewX(-20deg); transition:left 0.5s ease; }
    .btn-sm:hover::after { left:130%; }
    .btn-sm-primary { background:linear-gradient(135deg, var(--primary-blue), var(--primary-blue-light)); }
    .btn-sm-danger { background:linear-gradient(135deg, var(--color-danger), #B91C1C); }
    .btn-sm-success { background:linear-gradient(135deg, var(--color-success), #16A34A); }
    .btn-sm-warning { background:linear-gradient(135deg, var(--color-warning), #D97706); }
    .btn-sm-info { background:linear-gradient(135deg, var(--primary-blue-light), #3B5FA0); }

    .modal-overlay.active .modal-box { animation:fadeInUp 0.3s ease; }
    .modal-box { border-top:5px solid var(--accent-red); box-shadow:0 25px 60px rgba(8,31,77,0.35); }
    .modal-box h3 { color:var(--primary-blue-dark); font-size:1.2rem; position:relative; padding-bottom:10px; }
    .modal-box h3::after { content:''; position:absolute; bottom:0; right:0; width:50px; height:3px; background:linear-gradient(90deg, var(--accent-red), var(--primary-blue)); border-radius:4px; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { box-shadow:0 0 0 4px rgba(217,30,46,0.12); }

    .table-wrap th { background:linear-gradient(90deg, var(--primary-blue-dark), var(--primary-blue)); }
    .table-wrap tbody tr { transition:0.2s; border-right:3px solid transparent; }
    .table-wrap tbody tr:hover { border-right-color:var(--accent-red); background:linear-gradient(90deg, rgba(217,30,46,0.04), transparent); }
    .table-wrap tbody tr:nth-child(even) { background:rgba(11,42,111,0.02); }

    .folder-card { position:relative; overflow:hidden; }
    .folder-card i { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg, var(--accent-red), var(--primary-blue)); color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 10px; font-size:1.4rem; }
    .folder-card:hover i { animation:glowPulse 1.2s infinite; }

    .badge-status { box-shadow:0 2px 6px rgba(0,0,0,0.08); }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(8,31,77,0.55); backdrop-filter:blur(4px); z-index:9999; justify-content:center; align-items:center; padding:20px; }
    .modal-overlay.active { display:flex; }
    .modal-box { background:#fff; border-radius:20px; max-width:560px; width:100%; max-height:85vh; overflow-y:auto; padding:22px; }
    .modal-box h3 { margin-bottom:16px; }
    .modal-actions { display:flex; gap:10px; margin-top:16px; justify-content:flex-end; }

    @media (max-width:850px) {
        .shell { flex-direction:column; }
        .sidebar { width:100%; flex-direction:row; overflow-x:auto; padding:10px 12px; }
        .sidebar .brand { display:none; }
        .nav-items { flex-direction:row; padding:0; gap:6px; }
        .nav-item span { display:none; }
        .nav-back, .logout-btn { display:none; }
        .main { padding:18px 16px 40px; }
        .form-grid { grid-template-columns:1fr; }
        .stats-row { grid-template-columns:1fr 1fr; }
    }
</style>
</head>
<body>

<div class="shell">
    <aside class="sidebar">
        <div class="brand" id="sidebarBrand"><i class="fas fa-shield-alt"></i> لوحة التحكم</div>
        <nav class="nav-items" id="navItems"></nav>
        <a class="nav-back" href="index.html"><i class="fas fa-arrow-right"></i> رجوع للصفحة الرئيسية</a>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </aside>
    <main class="main" id="mainContent"></main>
</div>

<div class="modal-overlay" id="resourceModal">
    <div class="modal-box" id="resourceModalBox"></div>
</div>

<div class="modal-overlay" id="playerRecordModal">
    <div class="modal-box" id="playerRecordModalBox" style="max-width:920px;"></div>
</div>

<div class="modal-overlay" id="matchDetailModal">
    <div class="modal-box" id="matchDetailModalBox" style="max-width:780px;"></div>
</div>

<script>
    const DB_URL = "https://techno-new-a2ff4-default-rtdb.firebaseio.com";

    async function fbGet(path) {
        const res = await fetch(`${DB_URL}/${path}.json`);
        if (!res.ok) throw new Error('fbGet failed: ' + path + ' (' + res.status + ')');
        return await res.json();
    }
    async function fbPush(path, data) {
        try { const res = await fetch(`${DB_URL}/${path}.json`, { method:'POST', body: JSON.stringify(data) }); return await res.json(); }
        catch (e) { return null; }
    }
    async function fbUpdate(path, data) {
        try { await fetch(`${DB_URL}/${path}.json`, { method:'PATCH', body: JSON.stringify(data) }); } catch(e) {}
    }
    async function fbSet(path, data) {
        try { await fetch(`${DB_URL}/${path}.json`, { method:'PUT', body: JSON.stringify(data) }); } catch(e) {}
    }
    async function fbDelete(path) {
        try { await fetch(`${DB_URL}/${path}.json`, { method:'DELETE' }); } catch(e) {}
    }

    // ================================================================
    // الجلسة
    // ================================================================
    let session = null;
    try { session = JSON.parse(sessionStorage.getItem('techno_session')); } catch(e) {}
    if (!session || session.role !== 'admin') {
        sessionStorage.removeItem('techno_session');
        window.location.href = 'login.html';
    }

    function logout() {
        sessionStorage.removeItem('techno_session');
        window.location.href = 'index.html';
    }

    // ================================================================
    // الفئات (مشتركة بين كل الأقسام) - defaultCategories احتياطية فقط
    // ================================================================
    const defaultCategories = [
        { key:'U11', label:'تحت 11 سنة (U11)' }, { key:'U12', label:'تحت 12 سنة (U12)' },
        { key:'U13', label:'تحت 13 سنة (U13)' }, { key:'U14', label:'تحت 14 سنة (U14)' },
        { key:'U15', label:'تحت 15 سنة (U15)' }, { key:'U16', label:'تحت 16 سنة (U16)' },
        { key:'U17', label:'تحت 17 سنة (U17)' }
    ];
    let categories = [];

    // ================================================================
    // تحويل مجموعة بيانات من array (الشكل القديم) إلى object بمفاتيح push (آمن للـ CRUD)
    // ================================================================
    async function migrateToKeyedObject(path) {
        let raw;
        try {
            raw = await fbGet(path);
        } catch (e) {
            console.error('⚠️ فشل تحميل البيانات من', path, e);
            alert('⚠️ تعذر تحميل البيانات (مشكلة اتصال). لم يتم حذف أو تعديل أي شيء — حدّث الصفحة وحاول مجدداً.');
            return {};
        }
        if (Array.isArray(raw)) {
            const obj = {};
            raw.forEach((item, i) => { obj['m' + Date.now() + '_' + i] = item; });
            await fbSet(path, obj);
            return obj;
        }
        return raw || {};
    }

    // ================================================================
    // ضغط الصور إلى Base64 (حد أقصى 1200px، جودة 75%)
    // ================================================================
    function imageFileToBase64(file, maxDim = 1200, quality = 0.75) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let w = img.width, h = img.height;
                    if (w > maxDim || h > maxDim) {
                        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
                        else { w = Math.round(w * maxDim / h); h = maxDim; }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    function fieldInputHtml(field, value) {
        const val = value !== undefined && value !== null ? value : '';
        if (field.type === 'textarea') {
            return `<textarea data-field="${field.key}">${val}</textarea>`;
        }
        if (field.type === 'date') {
            return `<input type="date" data-field="${field.key}" value="${val}">`;
        }
        if (field.type === 'dynamicSelect') {
            const opts = categories.map(c => `<option value="${c.key}" ${c.key===val?'selected':''}>${c.label}</option>`).join('');
            return `<select data-field="${field.key}">${opts}</select>`;
        }
        if (field.type === 'image') {
            return `
                <input type="file" accept="image/*" data-field="${field.key}" data-imginput onchange="handleImageFieldChange(this)">
                <input type="hidden" data-field="${field.key}" data-imgvalue value="${val ? val.replace(/"/g,'&quot;') : ''}">
                <div class="image-field-preview" data-imgpreview>
                    ${val ? `<img src="${val}"><span class="upload-badge"><i class="fas fa-check-circle"></i> تم الرفع</span> <button type="button" class="btn-sm btn-sm-danger" onclick="clearImageField(this)"><i class="fas fa-times"></i> إزالة</button>` : ''}
                </div>
            `;
        }
        return `<input type="text" data-field="${field.key}" value="${(val+'').replace(/"/g,'&quot;')}">`;
    }

    window.handleImageFieldChange = async function(inputEl) {
        const file = inputEl.files[0];
        if (!file) return;
        const wrapper = inputEl.closest('.form-group');
        const preview = wrapper.querySelector('[data-imgpreview]');
        preview.innerHTML = `<span class="text-muted"><i class="fas fa-spinner fa-spin"></i> جارٍ المعالجة...</span>`;
        const base64 = await imageFileToBase64(file);
        const hiddenInput = wrapper.querySelector('[data-imgvalue]');
        hiddenInput.value = base64;
        preview.innerHTML = `<img src="${base64}"><span class="upload-badge"><i class="fas fa-check-circle"></i> تم الرفع</span> <button type="button" class="btn-sm btn-sm-danger" onclick="clearImageField(this)"><i class="fas fa-times"></i> إزالة</button>`;

            loadKeyedList('academyData/attendance')
        ]);
        const catSessions = sessions.filter(s => s.category === p.category && (s.status === 'finished' || s.status === 'ongoing'))
                                     .sort((a,b) => (b.date||'').localeCompare(a.date||''));
        window._attRecordsCache = attRecords;

        let presentCount = 0, absentCount = 0;
        catSessions.forEach(s => {
            const r = attRecords.find(a => a.playerId === p.id && a.sessionId === s._key);
            if (r?.status === 'present') presentCount++;
            if (r?.status === 'absent') absentCount++;
        });

        let html = `<p style="margin-bottom:12px; color:var(--text-muted);">حاضر: <strong style="color:var(--color-success);">${presentCount}</strong> | غائب: <strong style="color:var(--color-danger);">${absentCount}</strong></p>`;
        if (!catSessions.length) {
            html += `<p style="color:var(--text-muted); padding:14px 0;">لا توجد حصص منتهية أو جارية مسجّلة لفئة هذا اللاعب بعد.</p>`;
        } else {
            html += `<div class="attendance-list">`;
            catSessions.forEach(s => {
                const r = attRecords.find(a => a.playerId === p.id && a.sessionId === s._key);
                const status = r?.status || null;
                html += `
                    <div class="attendance-row">
                        <div><span class="p-name">${s.title || 'حصة تدريبية'}</span> <span class="p-cat">${s.date||''}</span></div>
                        <div class="att-toggle">
                            <button class="present-btn ${status==='present'?'selected':''}" onclick="setSessionAttendance('${s._key}','present')">حاضر</button>
                            <button class="absent-btn ${status==='absent'?'selected':''}" onclick="setSessionAttendance('${s._key}','absent')">غائب</button>
                        </div>
                    </div>`;
            });
            html += `</div>`;
        }
        document.getElementById('recordTab-attendance').innerHTML = html;
    }

    const SESSION_TYPES = ['تقنية','تكتيكية','بدنية','مباراة تدريبية','لياقة'];

    function calcDuration(start, end) {
        if (!start || !end) return '—';
        const [sh, sm] = start.split(':').map(Number);
        const [eh, em] = end.split(':').map(Number);
        let mins = (eh * 60 + em) - (sh * 60 + sm);
        if (mins < 0) mins += 24 * 60;
        const h = Math.floor(mins / 60), m = mins % 60;
        return h > 0 ? `${h}س ${m}د` : `${m}د`;
    }

    function statusBadge(statusKey) {
        const s = SESSION_STATUSES.find(x => x.key === statusKey) || SESSION_STATUSES[0];
        return `<span style="display:inline-block; padding:4px 12px; border-radius:20px; font-size:0.72rem; font-weight:700; background:${s.color}22; color:${s.color};">${s.label}</span>`;
    }

    async function isAttendanceCompleteForSession(sessionKey, category) {
        const [players, attendance] = await Promise.all([
            loadKeyedList('academyData/players'),
            loadKeyedList('academyData/attendance')
        ]);
        const catPlayers = players.filter(p => p.category === category);
        if (!catPlayers.length) return true;
        return catPlayers.every(p => attendance.some(a => a.sessionId === sessionKey && a.playerId === p.id));
    }

    async function saveSessionModal(key) {
        const data = {
            category: document.getElementById('smCategory').value,
            title: document.getElementById('smTitle').value.trim(),
            date: document.getElementById('smDate').value,
            field: document.getElementById('smField').value.trim(),
            startTime: document.getElementById('smStart').value,
            endTime: document.getElementById('smEnd').value,
            coachName: document.getElementById('smCoach').value,
            sessionType: document.getElementById('smType').value,
            status: document.getElementById('smStatus').value,
            goals: document.getElementById('smGoals').value.trim(),
            notes: document.getElementById('smNotes').value.trim()
        };
        if (!data.title || !data.date) { alert('❌ الرجاء إدخال عنوان الحصة والتاريخ على الأقل'); return; }

        if (data.status === 'finished') {
            if (!key) { alert('❌ لا يمكن إنشاء حصة جديدة بحالة "منتهية" مباشرة — أنشئها كـ"مجدولة" أولاً، ثم سجّل الحضور، ثم غيّر حالتها.'); return; }
            const complete = await isAttendanceCompleteForSession(key, data.category);
            if (!complete) { alert('❌ لا يمكن وضع هذه الحصة كـ"منتهية" قبل تسجيل حضور كل لاعبي الفئة. استخدم أيقونة "تسجيل الحضور" 📋 في جدول الحصص أولاً.'); return; }
        }

        if (key) await fbUpdate(`academyData/trainingSessions/${key}`, data);
        else await fbPush('academyData/trainingSessions', data);
        closeResourceModal();
        renderSessionsTable();
    }

    window.setSessionAttendanceLive = async function(playerId, status) {
        const session = window._sessAttSession;
        const records = window._sessAttRecords;
        const existing = records.find(a => a.sessionId === session._key && a.playerId === playerId);
        if (existing) {
            await fbUpdate(`academyData/attendance/${existing._key}`, { status });

            const res = await fbPush('academyData/attendance', { playerId, sessionId: session._key, status });

    // ================================================================
    // المباريات (Event Card + أهداف + تشكيلة + استدعاء متعدد الفئات)
    // ================================================================
    const MATCH_STATUSES = [
        { key:'upcoming', label:'قادمة', color:'#0B2A6F' },
        { key:'ongoing', label:'جارية الآن', color:'#22C55E' },
        { key:'finished', label:'انتهت', color:'#64748B' },
        { key:'cancelled', label:'ملغاة', color:'#DC2626' }
    ];
    const MATCH_TYPES = ['ودية','رسمية'];

    function entityStatusBadge(list, statusKey) {
        const s = list.find(x => x.key === statusKey) || list[0];
        return `<span style="display:inline-block; padding:4px 12px; border-radius:20px; font-size:0.72rem; font-weight:700; background:${s.color}22; color:${s.color};">${s.label}</span>`;
    }

    async function showDashMatches() {
        setActiveNav('matches');
        document.getElementById('mainContent').innerHTML = `
            <h2 class="page-title">⚽ المباريات</h2>
            <p class="page-sub">إدارة مباريات الأكاديمية — النتائج، الأهداف، التشكيلة، والاستدعاء</p>

                <table>
                    <thead><tr><th>#</th><th>الفئة</th><th>الخصم</th><th>التاريخ</th><th>النوع</th><th>الحالة</th><th>النتيجة</th><th>إجراءات</th></tr></thead>
                    <tbody id="matchesTbody"></tbody>
                </table>
            </div>
        `;
        renderMatchesTable();
    }
    window.showDashMatches = showDashMatches;

    async function renderMatchesTable() {
        const list = await loadKeyedList('academyData/matches');
        window._matchesCache = list;
        list.sort((a,b) => (b.date||'').localeCompare(a.date||''));
        const tbody = document.getElementById('matchesTbody');
        if (!tbody) return;
        if (!list.length) { tbody.innerHTML = `<tr><td colspan="8" style="padding:20px; color:var(--text-muted);">لا توجد مباريات بعد</td></tr>`; return; }
        tbody.innerHTML = list.map((m, idx) => `
            <tr>
                <td>${idx+1}</td>
                <td>${categories.find(c=>c.key===m.category)?.label || m.category || '—'}</td>
                <td style="font-weight:700;">${m.opponentName || '—'}</td>
                <td>${m.date || '—'}</td>
                <td>${m.matchType || '—'}</td>
                <td>${entityStatusBadge(MATCH_STATUSES, m.status || 'upcoming')}</td>
                <td>${(m.homeScore ?? '-')} - ${(m.awayScore ?? '-')}</td>

                </td>
            </tr>
        `).join('');
    }
    window.renderMatchesTable = renderMatchesTable;

    function openMatchModal(match) {
        const isEdit = !!match;
        const modalBox = document.getElementById('resourceModalBox');
        modalBox.innerHTML = `
            <h3>${isEdit ? 'تعديل مباراة' : 'إضافة مباراة جديدة'}</h3>
            <div class="form-grid">
                <div class="form-group"><label>الفئة</label><select id="mmCategory">${categories.map(c => `<option value="${c.key}" ${match?.category===c.key?'selected':''}>${c.label}</option>`).join('')}</select></div>
                <div class="form-group"><label>اسم الخصم</label><input type="text" id="mmOpponent" value="${match?.opponentName || ''}"></div>
                <div class="form-group full"><label>شعار الخصم</label>
                    <input type="file" accept="image/*" onchange="handleMatchLogoChange(this)">

                    <div class="image-field-preview" id="mmLogoPreview">${match?.opponentLogo ? `<img src="${match.opponentLogo}"><span class="upload-badge"><i class="fas fa-check-circle"></i> تم الرفع</span>` : ''}</div>

                <div class="form-group"><label>التاريخ</label><input type="date" id="mmDate" value="${match?.date || ''}"></div>
                <div class="form-group"><label>التوقيت</label><input type="time" id="mmTime" value="${match?.time || ''}"></div>
                <div class="form-group"><label>الملعب</label><input type="text" id="mmField" value="${match?.field || ''}"></div>
                <div class="form-group"><label>نوع المباراة</label><select id="mmType">${MATCH_TYPES.map(t => `<option value="${t}" ${match?.matchType===t?'selected':''}>${t}</option>`).join('')}</select></div>
                <div class="form-group full"><label>الحالة</label><select id="mmStatus">${MATCH_STATUSES.map(s => `<option value="${s.key}" ${match?.status===s.key?'selected':''}>${s.label}</option>`).join('')}</select></div>
                <div class="form-group"><label>نتيجة الأكاديمية</label><input type="number" id="mmHomeScore" value="${match?.homeScore ?? ''}"></div>
                <div class="form-group"><label>نتيجة الخصم</label><input type="number" id="mmAwayScore" value="${match?.awayScore ?? ''}"></div>
            </div>
            <div class="modal-actions">
                <button class="btn-sm" style="background:#e2e8f0;" onclick="closeResourceModal()">إلغاء</button>

            </div>
        `;
        document.getElementById('resourceModal').classList.add('active');
    }
    window.openMatchModal = openMatchModal;

    window.openMatchModalByKey = function(key) {
        const m = (window._matchesCache || []).find(x => x._key === key);
        openMatchModal(m);
    };

    window.handleMatchLogoChange = async function(inputEl) {
        const file = inputEl.files[0];
        if (!file) return;
        const preview = document.getElementById('mmLogoPreview');
        preview.innerHTML = `<span class="text-muted"><i class="fas fa-spinner fa-spin"></i> جارٍ المعالجة...</span>`;
        const base64 = await imageFileToBase64(file, 500, 0.8);
        document.getElementById('mmOpponentLogo').value = base64;
        preview.innerHTML = `<img src="${base64}"><span class="upload-badge"><i class="fas fa-check-circle"></i> تم الرفع</span>`;
    };

    async function saveMatchModal(key) {
        const data = {
            category: document.getElementById('mmCategory').value,
            opponentName: document.getElementById('mmOpponent').value.trim(),
            opponentLogo: document.getElementById('mmOpponentLogo').value,
            competition: document.getElementById('mmCompetition').value.trim(),
            round: document.getElementById('mmRound').value.trim(),
            date: document.getElementById('mmDate').value,
            time: document.getElementById('mmTime').value,
            field: document.getElementById('mmField').value.trim(),
            matchType: document.getElementById('mmType').value,
            status: document.getElementById('mmStatus').value,
            homeScore: document.getElementById('mmHomeScore').value !== '' ? Number(document.getElementById('mmHomeScore').value) : null,
            awayScore: document.getElementById('mmAwayScore').value !== '' ? Number(document.getElementById('mmAwayScore').value) : null
        };
        if (!data.opponentName || !data.date) { alert('❌ الرجاء إدخال اسم الخصم والتاريخ على الأقل'); return; }
        if (key) {
            await fbUpdate(`academyData/matches/${key}`, data);
        } else {
            data.goals = []; data.lineup = []; data.callUps = [];
            await fbPush('academyData/matches', data);
        }
        closeResourceModal();
        renderMatchesTable();
    }
    window.saveMatchModal = saveMatchModal;

    async function deleteMatch(key) {
        if (!confirm('حذف هذه المباراة نهائياً؟')) return;
        await fbDelete(`academyData/matches/${key}`);
        renderMatchesTable();
    }
    window.deleteMatch = deleteMatch;

    let currentMatchKey = null;

    async function openMatchDetail(key) {
        currentMatchKey = key;
        const list = window._matchesCache || await loadKeyedList('academyData/matches');
        const m = list.find(x => x._key === key);
        if (!m) return;
        const modalBox = document.getElementById('matchDetailModalBox');
        modalBox.innerHTML = `
            <h3>${m.opponentName || ''} — ${m.date || ''}</h3>
            <div class="profile-tabs">
                <button class="profile-tab-btn active" data-tab="goals" onclick="switchMatchTab('goals')">الأهداف</button>
                <button class="profile-tab-btn" data-tab="lineup" onclick="switchMatchTab('lineup')">التشكيلة</button>
                <button class="profile-tab-btn" data-tab="callups" onclick="switchMatchTab('callups')">قائمة الاستدعاء</button>
            </div>
            <div class="profile-tab-content active" id="matchTab-goals"></div>
            <div class="profile-tab-content" id="matchTab-lineup"></div>
            <div class="profile-tab-content" id="matchTab-callups"></div>
            <div class="modal-actions"><button class="btn-sm" style="background:#e2e8f0;" onclick="closeMatchDetailModal()">إغلاق</button></div>
        `;
        renderGoalsTab(m);
        renderLineupTab(m);
        renderCallUpsTab('matches', m);
        document.getElementById('matchDetailModal').classList.add('active');

    window.openMatchDetail = openMatchDetail;

    window.closeMatchDetailModal = function() { document.getElementById('matchDetailModal').classList.remove('active'); };
    window.switchMatchTab = function(tab) {
        document.querySelectorAll('#matchDetailModalBox .profile-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
        document.querySelectorAll('#matchDetailModalBox .profile-tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('matchTab-' + tab).classList.add('active');
    };

    function renderGoalsTab(m) {
        const goals = m.goals || [];
        window._goalsDraft = JSON.parse(JSON.stringify(goals));
        renderGoalsRows();
    }
    function renderGoalsRows() {
        let html = `<div id="goalsRows">`;
        window._goalsDraft.forEach((g, i) => {
            html += `
                <div class="dyn-row" data-idx="${i}">
                    <input placeholder="اسم الهداف" value="${g.scorer||''}" onchange="updateGoalDraft(${i},'scorer',this.value)">
                    <input placeholder="الدقيقة" type="number" value="${g.minute||''}" style="max-width:80px;" onchange="updateGoalDraft(${i},'minute',this.value)">
                    <select onchange="updateGoalDraft(${i},'team',this.value)">
                        <option value="home" ${g.team==='home'?'selected':''}>الأكاديمية</option>
                        <option value="away" ${g.team==='away'?'selected':''}>الخصم</option>
                    </select>
                    <button class="btn-sm btn-sm-danger" onclick="removeGoalRow(${i})"><i class="fas fa-times"></i></button>
                </div>`;
        });
        html += `</div>
            <button class="btn-sm btn-sm-primary" onclick="addGoalRow()"><i class="fas fa-plus"></i> إضافة هدف</button>
            <div style="margin-top:14px;"><button class="btn-sm btn-sm-success" onclick="saveGoals()"><i class="fas fa-save"></i> حفظ الأهداف</button></div>`;
        document.getElementById('matchTab-goals').innerHTML = html;
    }
    window.updateGoalDraft = function(i, field, val) { window._goalsDraft[i][field] = field==='minute' ? Number(val) : val; };
    window.addGoalRow = function() { window._goalsDraft.push({ scorer:'', minute:'', team:'home' }); renderGoalsRows(); };
    window.removeGoalRow = function(i) { window._goalsDraft.splice(i,1); renderGoalsRows(); };
    window.saveGoals = async function() {
        await fbUpdate(`academyData/matches/${currentMatchKey}`, { goals: window._goalsDraft });
        alert('✅ تم حفظ الأهداف');
        renderMatchesTable();
    };

    function renderLineupTab(m) {
        window._lineupDraft = JSON.parse(JSON.stringify(m.lineup || []));
        renderLineupRows();
    }
    function renderLineupRows() {
        let html = `<div id="lineupRows">`;
        window._lineupDraft.forEach((p, i) => {
            html += `
                <div class="dyn-row" data-idx="${i}">
                    <input placeholder="المركز (مثال: حارس مرمى)" value="${p.position||''}" onchange="updateLineupDraft(${i},'position',this.value)">
                    <input placeholder="اسم اللاعب" value="${p.playerName||''}" onchange="updateLineupDraft(${i},'playerName',this.value)">
                    <button class="btn-sm btn-sm-danger" onclick="removeLineupRow(${i})"><i class="fas fa-times"></i></button>
                </div>`;
        });
        html += `</div>
            <button class="btn-sm btn-sm-primary" onclick="addLineupRow()"><i class="fas fa-plus"></i> إضافة لاعب للتشكيلة</button>
            <div style="margin-top:14px;"><button class="btn-sm btn-sm-success" onclick="saveLineup()"><i class="fas fa-save"></i> حفظ التشكيلة</button></div>`;
        document.getElementById('matchTab-lineup').innerHTML = html;
    }
    window.updateLineupDraft = function(i, field, val) { window._lineupDraft[i][field] = val; };
    window.addLineupRow = function() { window._lineupDraft.push({ position:'', playerName:'' }); renderLineupRows(); };
    window.removeLineupRow = function(i) { window._lineupDraft.splice(i,1); renderLineupRows(); };
    window.saveLineup = async function() {
        await fbUpdate(`academyData/matches/${currentMatchKey}`, { lineup: window._lineupDraft });
        alert('✅ تم حفظ التشكيلة');
        renderMatchesTable();
    };

    // ===== قائمة الاستدعاء (مشتركة بين المباريات والبطولات — أي فئة عمرية) =====
    async function renderCallUpsTab(entityType, entity) {
        const containerId = entityType === 'matches' ? 'matchTab-callups' : 'tournTab-callups';
        const container = document.getElementById(containerId);
        if (!container) return;
        const allPlayers = await loadKeyedList('academyData/players');
        window._callUpAllPlayers = allPlayers;
        window._callUpDraft = [...(entity.callUps || [])];
        window._callUpEntityType = entityType;
        window._callUpEntityKey = entity._key;
        container.innerHTML = `
            <div style="display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;">
                <select id="callUpCatFilter" onchange="renderCallUpList()" style="padding:8px 12px; border-radius:10px; border:1.5px solid var(--border-card);">
                    <option value="">كل الفئات</option>
                    ${categories.map(c => `<option value="${c.key}">${c.label}</option>`).join('')}
                </select>
                <input type="text" id="callUpSearch" placeholder="🔍 بحث بالاسم..." oninput="renderCallUpList()" style="flex:1; min-width:160px; padding:8px 12px; border-radius:10px; border:1.5px solid var(--border-card);">
            </div>
            <div id="callUpListContainer"></div>
            <div style="margin-top:14px;"><button class="btn-sm btn-sm-success" onclick="saveCallUps()"><i class="fas fa-save"></i> حفظ قائمة الاستدعاء</button></div>
        `;
        renderCallUpList();
    }
    window.renderCallUpsTab = renderCallUpsTab;

    window.renderCallUpList = function() {
        const catF = document.getElementById('callUpCatFilter')?.value || '';
        const term = document.getElementById('callUpSearch')?.value.trim().toLowerCase() || '';
        const filtered = window._callUpAllPlayers.filter(p => {
            const name = `${p.firstName||''} ${p.lastName||''}`.toLowerCase();
            return (!catF || p.category === catF) && (!term || name.includes(term));
        });
        const listEl = document.getElementById('callUpListContainer');
        if (!filtered.length) { listEl.innerHTML = `<p style="color:var(--text-muted); padding:10px;">لا يوجد لاعبون مطابقون</p>`; return; }
        listEl.innerHTML = filtered.map(p => {
            const isCalled = window._callUpDraft.includes(p._key);
            return `
                <div class="callup-row">
                    <div><span class="cp-name">${p.firstName||''} ${p.lastName||''}</span><span class="cp-cat">${categories.find(c=>c.key===p.category)?.label || p.category || ''}</span></div>
                    <button class="btn-sm ${isCalled ? 'btn-sm-danger' : 'btn-sm-success'}" onclick="toggleCallUp('${p._key}')">${isCalled ? '✕ إزالة' : '✔ استدعاء'}</button>
                </div>`;
        }).join('');
    };
    window.toggleCallUp = function(playerKey) {
        const idx = window._callUpDraft.indexOf(playerKey);
        if (idx >= 0) window._callUpDraft.splice(idx, 1);
        else window._callUpDraft.push(playerKey);
        renderCallUpList();
    };
    window.saveCallUps = async function() {
        await fbUpdate(`academyData/${window._callUpEntityType}/${window._callUpEntityKey}`, { callUps: window._callUpDraft });
        alert('✅ تم حفظ قائمة الاستدعاء');
        if (window._callUpEntityType === 'matches') renderMatchesTable(); else renderTournamentsTable();
    };

        const file = inputEl.files[0];
        if (!file) return;
        const preview = document.getElementById('tmLogoPreview');
        preview.innerHTML = `<span class="text-muted"><i class="fas fa-spinner fa-spin"></i> جارٍ المعالجة...</span>`;
        const base64 = await imageFileToBase64(file, 500, 0.8);

    async function saveTournamentModal(key) {
        const data = {
            logo: document.getElementById('tmLogo').value,
            name: document.getElementById('tmName').value.trim(),
            organizer: document.getElementById('tmOrganizer').value.trim(),
            location: document.getElementById('tmLocation').value.trim(),
            teamsCount: document.getElementById('tmTeamsCount').value,
            dateStart: document.getElementById('tmDateStart').value,
            dateEnd: document.getElementById('tmDateEnd').value,
            groupStanding: document.getElementById('tmStanding').value.trim()
        };
        if (!data.name) { alert('❌ الرجاء إدخال اسم البطولة'); return; }
        if (key) await fbUpdate(`academyData/tournaments/${key}`, data);
        else { data.callUps = []; await fbPush('academyData/tournaments', data); }

    async function renderMessagesTable() {

            const t = MESSAGE_TYPES.find(x => x.key === m.type) || MESSAGE_TYPES[0];

            return `
            <tr>

    async function showDashSettings() {

            <p class="page-sub">تتحكم هذه الإعدادات في النصوص الظاهرة بالصفحة الرئيسية</p>

            <div class="form-card settings-section">
                <h4>النصوص الرئيسية</h4>
                <div class="form-grid">
                    <div class="form-group full"><label>عنوان الهيرو (يدعم HTML بسيط)</label><textarea id="setHeroTitle">${settingsDraft.heroTitle}</textarea></div>

                    <div class="form-group full"><label>العنوان</label><input id="setAddress" value="${settingsDraft.address}"></div>

        const cleanedLocations = locationsDraft.filter(l => l.name.trim());

    };

    async function sha256(text) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    window.changeAdminCode = async function() {
        const newCode = document.getElementById('newAdminCode').value.trim();
        const confirmCode = document.getElementById('confirmAdminCode').value.trim();
        if (newCode.length < 4) { alert('❌ الكود يجب أن يكون 4 خانات على الأقل'); return; }
        if (newCode !== confirmCode) { alert('❌ الكود غير متطابق مع التأكيد'); return; }
        const hash = await sha256(newCode);
        await fbSet('adminAccess/codeHash', hash);
        alert('✅ تم تغيير كود الدخول بنجاح');
        document.getElementById('newAdminCode').value = '';
        document.getElementById('confirmAdminCode').value = '';
    };

    let navFnMap = {};

    function buildNav() {
        const navEl = document.getElementById('navItems');

        items.forEach(it => {

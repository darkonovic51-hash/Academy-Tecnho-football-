<script>
    // ================================================================
    // 1. إعدادات Firebase (صالحة)
    // ================================================================
    const firebaseConfig = {
        apiKey: "AIzaSyCyNanQ-kKG70ThYujTYXHj6ySYFReSH0s",
        authDomain: "academy-tecni.firebaseapp.com",
        databaseURL: "https://academy-tecni-default-rtdb.firebaseio.com",
        projectId: "academy-tecni",
        storageBucket: "academy-tecni.firebasestorage.app",
        messagingSenderId: "857198194842",
        appId: "1:857198194842:web:f2c077424dca6bd9c5af23",
        measurementId: "G-FDTN8JMB5R"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ================================================================
    // 2. دوال عامة للقراءة والكتابة من/إلى Firebase
    // ================================================================

    // حفظ أي بيانات (مع fallback محلي)
    async function saveToFirebase(path, data) {
        try {
            await database.ref(path).set(data);
            console.log(`✅ تم حفظ ${path} في Firebase`);
        } catch (error) {
            console.warn(`⚠️ فشل حفظ ${path} في Firebase، نحفظ محلياً:`, error);
            localStorage.setItem('techno_' + path.replace('/', '_'), JSON.stringify(data));
        }
    }

    // جلب أي بيانات (مع fallback محلي)
    function getFromFirebase(path, callback) {
        database.ref(path).once('value')
            .then((snapshot) => {
                const data = snapshot.val();
                if (data) {
                    callback(data);
                } else {
                    // إذا كانت فارغة، نرجع مصفوفة فارغة أو كائن افتراضي
                    callback(null);
                }
            })
            .catch((error) => {
                console.warn(`⚠️ فشل جلب ${path} من Firebase، نستخدم المحلي:`, error);
                const local = JSON.parse(localStorage.getItem('techno_' + path.replace('/', '_')));
                callback(local || null);
            });
    }

    // ================================================================
    // 3. دوال خاصة بكل قسم (معرض، فيديو، جدول، مباريات، لاعبين)
    // ================================================================

    // --- المعرض ---
    function loadGallery(callback) {
        getFromFirebase('academyData/gallery', (data) => {
            if (data) {
                appData.gallery = data;
            } else {
                // بيانات افتراضية
                appData.gallery = defaultData.gallery;
                saveToFirebase('academyData/gallery', appData.gallery);
            }
            callback();
        });
    }

    function saveGallery() {
        saveToFirebase('academyData/gallery', appData.gallery);
    }

    // --- الفيديوهات ---
    function loadVideos(callback) {
        getFromFirebase('academyData/videos', (data) => {
            if (data) {
                appData.videos = data;
            } else {
                appData.videos = defaultData.videos;
                saveToFirebase('academyData/videos', appData.videos);
            }
            callback();
        });
    }

    function saveVideos() {
        saveToFirebase('academyData/videos', appData.videos);
    }

    // --- جدول التدريبات ---
    function loadSchedule(callback) {
        getFromFirebase('academyData/schedule', (data) => {
            if (data) {
                appData.schedule = data;
            } else {
                appData.schedule = defaultData.schedule;
                saveToFirebase('academyData/schedule', appData.schedule);
            }
            callback();
        });
    }

    function saveSchedule() {
        saveToFirebase('academyData/schedule', appData.schedule);
    }

    // --- المباريات ---
    function loadMatches(callback) {
        getFromFirebase('academyData/matches', (data) => {
            if (data) {
                appData.matches = data;
            } else {
                appData.matches = defaultData.matches;
                saveToFirebase('academyData/matches', appData.matches);
            }
            callback();
        });
    }

    function saveMatches() {
        saveToFirebase('academyData/matches', appData.matches);
    }

    // --- اللاعبين ---
    function loadPlayers(callback) {
        getFromFirebase('academyData/players', (data) => {
            if (data) {
                appData.players = data;
            } else {
                appData.players = defaultData.players;
                saveToFirebase('academyData/players', appData.players);
            }
            callback();
        });

    function savePlayers() {
        saveToFirebase('academyData/players', appData.players);
    }

    // ================================================================
    // 4. البيانات والـ LocalStorage (كخلفية)
    // ================================================================

    const STORAGE_KEY = 'techno_academy_data';
    const defaultData = {
        gallery: [
            { id: 1, title: 'لاعبو الأكاديمية', url: 'https://github.com/darkonovic51-hash/Academy-Tecnho-football-/raw/bc8f5fa98c6a5536771f5d6df88692cb9d18dd6b/file_0000000080887246a3ae03f9d509af06.png' },
            { id: 2, title: 'معرض الأكاديمية 1', url: 'https://github.com/darkonovic51-hash/Academy-Tecnho-football-/raw/bc8f5fa98c6a5536771f5d6df88692cb9d18dd6b/file_00000000bf50722f865fdd37161eb04e.png' },
            { id: 3, title: 'معرض الأكاديمية 2', url: 'https://github.com/darkonovic51-hash/Academy-Tecnho-football-/raw/7b5f5a9c030c088f4af9797c2a1365727d7b3274/file_00000000464071f4b244348f594f097c.png' },
            { id: 4, title: 'معرض الأكاديمية 3', url: 'https://github.com/darkonovic51-hash/Academy-Tecnho-football-/raw/ed7625f1c04b4c31a91a01fcafb72048fc1c5993/file_000000006e6471f48132a02c81c00658.png' },
            { id: 5, title: 'تجديد عقد لاعب', url: 'https://github.com/darkonovic51-hash/Academy-Tecnho-football-/raw/bc8f5fa98c6a5536771f5d6df88692cb9d18dd6b/file_00000000c71471fd9f054dee930088ad.png' }
        ],
        videos: [
            { id: 1, title: 'فيديو تعريفي بالأكاديمية', url: 'https://github.com/darkonovic51-hash/Academy-Tecnho-football-/raw/42aaf4132007f328e33d2aeaa0b05670a9e3f332/%E2%96%AA%EF%B8%8F%D9%86%D8%A8%D8%B0%D8%A9%20%D8%B9%D9%86%20%D9%85%D9%82%D8%B1%20%D8%AA%D8%AF%D8%B1%D9%8A%D8%A8%D8%A7%D8%AA%20%D8%A3%D9%83%D8%A7%D8%AF%D9%8A%D9%85%D9%8A%D8%AA%D9%86%D8%A7%20%D9%81%D8%B1%D8%B9%20_%20%D8%A8%D8%B1%D8%AC%20%D8%A7%D9%84%D9%83%D9%8A%D9%81%D8%A7%D9%86%20_%20%D9%81%D9%8A%20%D9%85%D9%84%D8%A7%D8%B9%D8%A8%20%D9%85%D8%BA%D8%B7%D8%A7%D8%A9%20%D8%8C%20%D8%A3%D9%85%D8%A7%D9%83%D9%86%20%D8%A7%D9%84%D8%AA%D8%B3%D8%AC%D9%8A%D9%84%20%D8%AC%D8%AF%20.mp4' }
        ],
        schedule: [
            { id: 1, category: 'تحت 16 سنة', time: '—', field: '—' },
            { id: 2, category: 'تحت 15 سنة', time: '—', field: '—' },
            { id: 3, category: 'تحت 14 سنة', time: '—', field: '—' },
            { id: 4, category: 'تحت 13 سنة', time: '—', field: '—' },
            { id: 5, category: 'تحت 12 سنة', time: '—', field: '—' },
            { id: 6, category: 'تحت 11 سنة', time: '—', field: '—' }
        ],
        matches: [],
        players: []
    };

    let appData = {
        gallery: [],
        videos: [],
        schedule: [],
        matches: [],
        players: []
    };

    // ================================================================
    // 5. دوال العرض (تعتمد على appData)
    // ================================================================

    function renderGallery() {
        const container = document.getElementById('galleryGrid');
        if (!container) return;
        container.innerHTML = '';
        if (!appData.gallery || appData.gallery.length === 0) {
            container.innerHTML = '<p style="color:var(--light-gray);">لا توجد صور في المعرض.</p>';
            return;
        }
        appData.gallery.forEach(item => {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.innerHTML = `
                <img src="${item.url}" alt="${item.title}" loading="lazy">
                <div class="overlay"><span>${item.title}</span></div>
            `;
            container.appendChild(div);
        });
    }

    function renderSchedule() {
        const container = document.getElementById('scheduleWrapper');
        if (!container) return;
        if (!appData.schedule || appData.schedule.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:30px;"><i class="fas fa-calendar-alt" style="font-size:2rem; color:var(--primary-gold); opacity:0.5;"></i><p style="color:var(--light-gray); margin-top:10px;">لا توجد بيانات تدريب.</p></div>`;
            return;
        }
        let html = `<table class="schedule-table"><thead><tr><th>الفئة</th><th>موعد التدريب</th><th>الوقت</th><th>الملعب</th></tr></thead><tbody>`;
        appData.schedule.forEach(row => {
            html += `<tr><td>${row.category}</td><td>${row.time || '—'}</td><td>${row.time || '—'}</td><td>${row.field || '—'}</td></tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function renderMatches() {
        const container = document.getElementById('matchesContainer');
        if (!container) return;
        if (!appData.matches || appData.matches.length === 0) {
            container.innerHTML = `
                <i class="fas fa-calendar-alt" style="font-size:3rem; color:var(--primary-gold); opacity:0.5;"></i>
                <h3 style="color:#FFFFFF; margin-top:15px;">لا توجد مباريات ودية حالياً</h3>
                <p style="color:var(--light-gray);">سيتم الإعلان عن المباريات القادمة فور اعتماد الجدول الزمني.</p>
            `;
            return;
        }
        let html = `<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:20px;">`;
        appData.matches.forEach(m => {
            html += `
                <div style="background:rgba(255,255,255,0.05); border-radius:16px; padding:20px; text-align:center;">
                    <div style="color:var(--primary-gold); font-weight:700;">${m.opponent || 'خصم'}</div>
                    <div style="color:var(--light-gray);">${m.date || 'تاريخ'}</div>
                    <div style="color:var(--light-gray);">${m.location || 'مكان'}</div>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    function renderPlayers() {
        const container = document.getElementById('playersContainer');
        if (!container) return;
        if (!appData.players || appData.players.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; padding:40px; background:rgba(255,255,255,0.05); border-radius:var(--radius); border:2px dashed rgba(212,160,23,0.3);">

                    <p style="color:var(--light-gray);">يمكن للمسؤول إضافة اللاعبين من لوحة التحكم.</p>
                </div>
            `;
            return;
        }
        let html = `<div class="players-list">`;
        appData.players.forEach(p => {
            html += `
                <div class="player-item">
                    <div class="name">${p.name}</div>
                    <div class="position">${p.category || 'فئة'}</div>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    // ================================================================
    // 6. دوال الإدارة (تعديل البيانات + حفظ في Firebase)
    // ================================================================

    // --- المعرض ---
    function renderAdminGallery() {
        const container = document.getElementById('adminGalleryList');
        container.innerHTML = '';
        appData.gallery.forEach((item, idx) => {
            const div = document.createElement('div');
            div.style.cssText = 'display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.05); border-radius:12px; padding:8px 16px;';
            div.innerHTML = `
                <span style="flex:1; color:#fff;">${item.title}</span>
                <button onclick="deleteGalleryItem(${idx})" style="background:var(--primary-gold); border:none; color:#fff; padding:4px 12px; border-radius:20px; cursor:pointer;">✕</button>
            `;
            container.appendChild(div);
        });
    }

    function addGalleryItem() {
        const title = document.getElementById('newGalleryTitle').value.trim();
        const url = document.getElementById('newGalleryUrl').value.trim();
        if (!title || !url) { alert('الرجاء إدخال عنوان ورابط الصورة'); return; }
        appData.gallery.push({ id: Date.now(), title, url });
        saveGallery();
        document.getElementById('newGalleryTitle').value = '';
        document.getElementById('newGalleryUrl').value = '';
        renderAdminGallery();
        renderGallery();
    }

    function deleteGalleryItem(idx) {
        appData.gallery.splice(idx, 1);
        saveGallery();
        renderAdminGallery();
        renderGallery();
    }

    // --- الفيديوهات ---
    function renderAdminVideos() {
        const container = document.getElementById('adminVideoList');
        container.innerHTML = '';
        appData.videos.forEach((item, idx) => {
            const div = document.createElement('div');
            div.style.cssText = 'display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.05); border-radius:12px; padding:8px 16px; margin-bottom:5px;';
            div.innerHTML = `
                <span style="flex:1; color:#fff;">${item.title}</span>
                <button onclick="deleteVideoItem(${idx})" style="background:var(--primary-gold); border:none; color:#fff; padding:4px 12px; border-radius:20px; cursor:pointer;">✕</button>
            `;
            container.appendChild(div);
        });
    }

    function addVideo() {
        const title = document.getElementById('newVideoTitle').value.trim();
        const url = document.getElementById('newVideoUrl').value.trim();
        if (!title || !url) { alert('الرجاء إدخال عنوان ورابط الفيديو'); return; }
        appData.videos.push({ id: Date.now(), title, url });
        saveVideos();
        document.getElementById('newVideoTitle').value = '';
        document.getElementById('newVideoUrl').value = '';
        renderAdminVideos();
    }

    function deleteVideoItem(idx) {
        appData.videos.splice(idx, 1);
        saveVideos();
        renderAdminVideos();
    }

    // --- جدول التدريبات ---
    function renderAdminSchedule() {
        const container = document.getElementById('adminScheduleContainer');
        let html = `
            <div style="overflow-x:auto;">
                <table style="width:100%; border-collapse:collapse;">
                    <thead>
                        <tr style="background:rgba(0,0,0,0.3);">
                            <th style="padding:8px;">الفئة</th>
                            <th style="padding:8px;">موعد التدريب</th>
                            <th style="padding:8px;">الوقت</th>
                            <th style="padding:8px;">الملعب</th>
                            <th style="padding:8px;">حذف</th>
                        </tr>
                    </thead>
                    <tbody>
        `;
        appData.schedule.forEach((row, idx) => {
            html += `
                <tr>
                    <td><input value="${row.category}" data-idx="${idx}" data-field="category" class="schedule-admin-input" style="width:100%; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff;"></td>
                    <td><input value="${row.time}" data-idx="${idx}" data-field="time" class="schedule-admin-input" style="width:100%; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff;"></td>
                    <td><input value="${row.time}" data-idx="${idx}" data-field="time" class="schedule-admin-input" style="width:100%; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff;"></td>
                    <td><input value="${row.field}" data-idx="${idx}" data-field="field" class="schedule-admin-input" style="width:100%; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff;"></td>
                    <td><button onclick="deleteScheduleRow(${idx})" style="background:var(--primary-gold); border:none; color:#fff; padding:4px 12px; border-radius:20px; cursor:pointer;">✕</button></td>
                </tr>
            `;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;

        document.querySelectorAll('.schedule-admin-input').forEach(inp => {
            inp.addEventListener('change', function() {
                const idx = parseInt(this.dataset.idx);
                const field = this.dataset.field;
                appData.schedule[idx][field] = this.value;
                // حفظ تلقائي عند التغيير
                saveSchedule();
                renderSchedule();
            });
        });

    function addScheduleRow() {
        appData.schedule.push({ id: Date.now(), category: 'فئة جديدة', time: '—', field: '—' });
        saveSchedule();
        renderAdminSchedule();
        renderSchedule();
    }

        appData.schedule.splice(idx, 1);
        saveSchedule();
        renderAdminSchedule();
        renderSchedule();
    }

    function saveScheduleAdmin() {
        saveSchedule();
        renderSchedule();
        alert('✅ تم حفظ جدول التدريبات');

    function renderAdminMatches() {
        const container = document.getElementById('adminMatchesContainer');
        let html = '';
        appData.matches.forEach((m, idx) => {
            html += `
                <div style="display:flex; gap:10px; align-items:center; background:rgba(255,255,255,0.05); border-radius:12px; padding:8px 16px; margin-bottom:5px; flex-wrap:wrap;">

                    <input value="${m.date || ''}" data-idx="${idx}" data-field="date" class="match-admin-input" placeholder="التاريخ" style="flex:1; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff;">

                </div>

        });
        container.innerHTML = html;

        document.querySelectorAll('.match-admin-input').forEach(inp => {

                const field = this.dataset.field;
                appData.matches[idx][field] = this.value;

                renderMatches();
            });

        renderAdminMatches();
        renderMatches();

        alert('✅ تم حفظ المباريات');
    }

    // --- اللاعبين ---
    function renderAdminPlayers() {
        const container = document.getElementById('adminPlayersContainer');
        let html = '';
        appData.players.forEach((p, idx) => {
            html += `
                <div style="display:flex; gap:10px; align-items:center; background:rgba(255,255,255,0.05); border-radius:12px; padding:8px 16px; margin-bottom:5px; flex-wrap:wrap;">
                    <input value="${p.name || ''}" data-idx="${idx}" data-field="name" class="player-admin-input" placeholder="الاسم" style="flex:1; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff;">
                    <input value="${p.category || ''}" data-idx="${idx}" data-field="category" class="player-admin-input" placeholder="الفئة" style="flex:1; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff;">
                    <button onclick="deletePlayer(${idx})" style="background:var(--primary-gold); border:none; color:#fff; padding:4px 12px; border-radius:20px; cursor:pointer;">✕</button>
                </div>
            `;
        });
        container.innerHTML = html;

        document.querySelectorAll('.player-admin-input').forEach(inp => {
            inp.addEventListener('change', function() {
                const idx = parseInt(this.dataset.idx);
                const field = this.dataset.field;
                appData.players[idx][field] = this.value;
                savePlayers();
                renderPlayers();
            });
        });
    }

    function addPlayer() {
        appData.players.push({ id: Date.now(), name: 'لاعب جديد', category: 'فئة' });
        savePlayers();
        renderAdminPlayers();
        renderPlayers();
    }

    function deletePlayer(idx) {
        appData.players.splice(idx, 1);
        savePlayers();
        renderAdminPlayers();
        renderPlayers();
    }

    function savePlayersAdmin() {
        savePlayers();
        renderPlayers();
        alert('✅ تم حفظ اللاعبين');
    }

    // ================================================================
    // 7. نموذج التسجيل (نفس السابق مع Firebase)
    // ================================================================

    async function saveRegistrationToFirebase(regData) {
        try {
            const newRef = database.ref('registrations').push();
            await newRef.set({
                ...regData,
                timestamp: firebase.database.ServerValue.TIMESTAMP || Date.now()
            });
            console.log('✅ تم الحفظ في Firebase');
        } catch (error) {
            console.warn('⚠️ فشل الحفظ في Firebase، نحفظ محلياً:', error);
            let local = JSON.parse(localStorage.getItem('techno_registrations_local')) || [];
            local.push({ ...regData, id: Date.now(), timestamp: Date.now() });
            localStorage.setItem('techno_registrations_local', JSON.stringify(local));
            throw error;
        }
    }

    function getRegistrationsFromFirebase(callback) {
        database.ref('registrations').orderByChild('timestamp').once('value')
            .then((snapshot) => {
                const data = snapshot.val();
                const registrations = [];
                if (data) {
                    Object.keys(data).forEach((key) => {
                        registrations.push({ id: key, ...data[key] });
                    });
                }
                callback(registrations);
            })
            .catch((error) => {
                console.warn('⚠️ فشل الجلب من Firebase، نستخدم المحلي:', error);
                const local = JSON.parse(localStorage.getItem('techno_registrations_local')) || [];
                callback(local);
            });
    }

    function deleteRegistrationFromFirebase(id, callback) {
        database.ref('registrations/' + id).remove()
            .then(() => callback())
            .catch((error) => {
                console.warn('⚠️ فشل الحذف من Firebase، نحاول محلياً:', error);
                let local = JSON.parse(localStorage.getItem('techno_registrations_local')) || [];
                local = local.filter(item => item.id != id);
                localStorage.setItem('techno_registrations_local', JSON.stringify(local));
                callback();
            });
    }

    document.getElementById('registrationForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const firstName = document.getElementById('regFirstName').value.trim();
        const lastName = document.getElementById('regLastName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const location = document.getElementById('regLocation').value;

        if (!firstName || !lastName || !phone) {
            alert('❌ الرجاء ملء جميع الحقول المطلوبة');
            return;
        }

        const regData = {
            firstName,
            lastName,
            phone,
            location,
            date: new Date().toLocaleString('ar-EG')
        };

        try {
            await saveRegistrationToFirebase(regData);
            
            const formData = new FormData();
            formData.append('الاسم الشخصي', firstName);
            formData.append('اللقب العائلي', lastName);
            formData.append('رقم الهاتف', phone);
            formData.append('المكان', location);
            formData.append('_subject', '🔔 طلب تسجيل جديد - أكاديمية تيكنو');
            formData.append('_captcha', 'false');

            await fetch('https://formsubmit.co/ajax/darkonovic51@gmail.com', {
                method: 'POST',
                body: formData
            });

            alert('✅ تم تسجيل طلبك بنجاح! سيتم التواصل معكم قريباً.');
            this.reset();
        } catch (error) {
            console.error(error);
            alert('❌ حدث خطأ في الإرسال، لكن بياناتك محفوظة في السحابة.');
        }
    });

    // ================================================================
    // 8. لوحة التحكم (تعرض جميع البيانات)
    // ================================================================

    const ADMIN_PASSWORD_KEY = 'techno_admin_pass';
    let adminPassword = localStorage.getItem(ADMIN_PASSWORD_KEY) || 'admin2025';
    let adminLoggedIn = false;

    function adminLogin() {
        const input = document.getElementById('adminPassInput').value;
        if (input === adminPassword) {
            adminLoggedIn = true;
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            renderAdminDashboard();
        } else {
            document.getElementById('adminLoginError').style.display = 'block';
            setTimeout(() => document.getElementById('adminLoginError').style.display = 'none', 3000);
        }
    }

    function renderAdminDashboard() {
        getRegistrationsFromFirebase((registrations) => {
            document.getElementById('adminStats').innerHTML = `
                <div class="admin-stat"><div class="num">${registrations.length}</div><div class="label">طلبات التسجيل</div></div>
                <div class="admin-stat"><div class="num">${appData.gallery.length}</div><div class="label">الصور</div></div>
                <div class="admin-stat"><div class="num">${appData.videos.length}</div><div class="label">الفيديوهات</div></div>
                <div class="admin-stat"><div class="num">${appData.schedule.length}</div><div class="label">صفوف التدريب</div></div>
                <div class="admin-stat"><div class="num">${appData.matches.length}</div><div class="label">المباريات</div></div>
                <div class="admin-stat"><div class="num">${appData.players.length}</div><div class="label">اللاعبون</div></div>
            `;

            const tbody = document.getElementById('adminRegistrations');
            tbody.innerHTML = '';
            registrations.forEach((reg, idx) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = idx + 1;
                row.insertCell(1).innerText = reg.firstName || '';
                row.insertCell(2).innerText = reg.lastName || '';
                row.insertCell(3).innerText = reg.phone || '';
                row.insertCell(4).innerText = reg.location || '';
                row.insertCell(5).innerText = reg.date || '';
                const delCell = row.insertCell(6);
                delCell.innerHTML = `<button class="del-btn" onclick="deleteRegistration('${reg.id}')">✕</button>`;
            });
        });

        renderAdminGallery();
        renderAdminVideos();
        renderAdminSchedule();
        renderAdminMatches();
        renderAdminPlayers();
    }

    function deleteRegistration(id) {
        if (!confirm('هل أنت متأكد من حذف هذا الطلب؟')) return;
        deleteRegistrationFromFirebase(id, () => {
            renderAdminDashboard();
        });
    }

    function changeAdminPassword() {
        const newPass = document.getElementById('newAdminPass').value.trim();
        if (newPass.length < 4) { alert('كلمة السر يجب أن تكون 4 أحرف على الأقل'); return; }
        adminPassword = newPass;
        localStorage.setItem(ADMIN_PASSWORD_KEY, adminPassword);
        alert('✅ تم تغيير كلمة السر بنجاح');
        document.getElementById('newAdminPass').value = '';
    }

    // ================================================================
    // 9. نافذة التنبيه (كما هي)
    // ================================================================

    const modal = document.getElementById('paymentModal');
    const closeModalBtn = document.getElementById('closePaymentModal');

    setInterval(() => {
        modal.classList.add('active');
        const content = modal.querySelector('.payment-modal-content');
        content.style.animation = 'none';
        setTimeout(() => {
            content.style.animation = 'modalPop 0.4s ease, shake 0.5s 0.4s ease';
        }, 10);
    }, 10000);

    closeModalBtn.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('active');
    });

    // ================================================================
    // 10. تهيئة الموقع (تحميل جميع البيانات من Firebase)
    // ================================================================

    function init() {
        // تحميل جميع البيانات من Firebase أولاً، ثم عرضها
        loadGallery(() => {
            renderGallery();
            // بعد تحميل المعرض، نكمل باقي البيانات
            loadVideos(() => {
                renderAdminVideos(); // لا حاجة لعرضها في الصفحة الرئيسية، لكن نحدث الإدارة
                loadSchedule(() => {
                    renderSchedule();
                    loadMatches(() => {
                        renderMatches();
                        loadPlayers(() => {
                            renderPlayers();
                            // بعد تحميل كل شيء، نعرض لوحة التحكم إذا كان المسؤول مسجلاً
                            if (adminLoggedIn) renderAdminDashboard();
                        });
                    });
                });
            });
        });

        // الهيدر والقوائم
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 60) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });

        const menuBtn = document.getElementById('menuBtn');
        const navLinks = document.getElementById('navLinks');
        menuBtn.addEventListener('click', () => navLinks.classList.toggle('show'));

        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    if (navLinks.classList.contains('show')) navLinks.classList.remove('show');
                }
            });
        });

        // فتح/إغلاق لوحة التحكم
        document.getElementById('adminToggle').addEventListener('click', function() {
            document.getElementById('adminPanel').classList.toggle('active');
            if (adminLoggedIn) renderAdminDashboard();
        });

        document.getElementById('closeAdmin').addEventListener('click', function() {
            document.getElementById('adminPanel').classList.remove('active');
        });

        // صور المدير الفني (تأثير انتقالي)
        let coachIndex = 0;
        const coachImages = document.querySelectorAll('#coachImages img');
        if (coachImages.length > 1) {
            setInterval(() => {
                coachImages.forEach(img => img.classList.remove('active'));
                coachIndex = (coachIndex + 1) % coachImages.length;
                coachImages[coachIndex].classList.add('active');
            }, 3000);
        }
    }

    // بدء التهيئة
    init();
</script>

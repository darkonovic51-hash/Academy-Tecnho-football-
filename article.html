<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مقال | أكاديمية تيكنو</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    :root {
        --primary-blue:#0B2A6F; --primary-blue-dark:#081F4D;
        --accent-red:#D91E2E; --accent-red-hover:#B51725;
        --text-dark:#1E293B; --text-muted:#64748B;
        --cream:#F8FAFC; --border-card:rgba(11,42,111,0.10);
        --shadow:0 20px 45px rgba(11,42,111,0.10);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'IBM Plex Sans Arabic','Cairo',sans-serif; background:var(--cream); color:var(--text-dark); line-height:1.7; }
    .container { max-width:820px; margin:0 auto; padding:0 20px; }
    header.topbar { background:linear-gradient(135deg, var(--primary-blue-dark), var(--primary-blue)); padding:20px; text-align:center; position:relative; }
    header.topbar .logo-row { display:flex; align-items:center; justify-content:center; gap:10px; }
    header.topbar img { height:40px; }
    header.topbar span { color:#fff; font-weight:800; font-size:1.1rem; font-family:'Cairo',sans-serif; }
    header.topbar span .accent { color:#FF6B6B; }
    .back-link { position:absolute; top:20px; right:20px; color:rgba(255,255,255,0.85); text-decoration:none; font-size:0.85rem; display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.1); padding:8px 16px; border-radius:30px; transition:0.2s; }
    .back-link:hover { background:#fff; color:var(--primary-blue); }

    .hero-img { width:100%; height:340px; object-fit:cover; background:var(--border-card); }
    main { padding:0 0 60px; }
    .article-content-card { background:#fff; border-radius:22px 22px 0 0; margin-top:-40px; position:relative; z-index:2; padding:34px 30px 40px; box-shadow:0 -10px 30px rgba(11,42,111,0.08); }
    .article-content-card h1 { font-family:'Cairo',sans-serif; font-weight:900; font-size:2rem; color:var(--primary-blue-dark); margin-bottom:22px; border-bottom:4px solid var(--accent-red); display:inline-block; padding-bottom:10px; line-height:1.4; }
    .article-body-text {
        font-family:'Cairo','IBM Plex Sans Arabic', sans-serif;
        font-size:1.32rem;
        font-weight:600;
        line-height:2.4;
        color:#0F172A;
        white-space:pre-wrap;
        letter-spacing:0.2px;
        text-align:justify;
    }
    .article-body-text::first-letter { font-size:2.8rem; font-weight:900; color:var(--accent-red); line-height:1; }

    .empty-state { text-align:center; padding:70px 20px; color:var(--text-muted); }
    .empty-state i { font-size:2.8rem; color:var(--accent-red); opacity:0.4; margin-bottom:14px; display:block; }
    .empty-state a { color:var(--accent-red); font-weight:700; text-decoration:none; }
</style>
</head>
<body>

<header class="topbar">
    <a href="index.html#articles" class="back-link"><i class="fas fa-arrow-right"></i> المقالات</a>
    <div class="logo-row">
        <img src="https://github.com/darkonovic51-hash/Academy-Tecnho-football-/raw/42aaf4132007f328e33d2aeaa0b05670a9e3f332/1000015229-removebg-preview.png" alt="شعار">
        <span>تيكنو <span class="accent">Academy</span></span>
    </div>
</header>

<main>
    <img id="heroImg" class="hero-img" style="display:none;" alt="">
    <div class="container">
        <div id="mainContainer">
            <p style="text-align:center; color:var(--text-muted); padding:40px 0;">جارٍ التحميل...</p>
        </div>
    </div>
</main>

<script>
    const DB_URL = "https://techno-new-a2ff4-default-rtdb.firebaseio.com";

    async function fbGet(path) {
        const res = await fetch(`${DB_URL}/${path}.json`);
        if (!res.ok) throw new Error('fbGet failed');
        return await res.json();
    }

    function getParam(name) { return new URLSearchParams(window.location.search).get(name); }

    async function init() {
        const id = getParam('id');
        const container = document.getElementById('mainContainer');
        if (!id) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>لم يتم تحديد مقال.</p><a href="index.html">العودة للصفحة الرئيسية</a></div>`;
            return;
        }
        let article;
        try { article = await fbGet(`academyData/articles/${id}`); }
        catch (e) { article = null; }

        if (!article) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-newspaper"></i><p>لم يتم العثور على هذا المقال.</p><a href="index.html">العودة للصفحة الرئيسية</a></div>`;
            return;
        }

        if (article.image) {
            const heroImg = document.getElementById('heroImg');
            heroImg.src = article.image;
            heroImg.alt = article.title || '';
            heroImg.style.display = 'block';
        }

        container.innerHTML = `
            <div class="article-content-card">
                <h1>${article.title || ''}</h1>
                <div class="article-body-text">${(article.content || '').replace(/</g,'&lt;')}</div>
            </div>
        `;
        document.title = (article.title || 'مقال') + ' | أكاديمية تيكنو';
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
